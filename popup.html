<!DOCTYPE html>
<html lang=""en">
<head>
    <meta charset="UTF-8">
    <title>Tab Rot - Settings</title>
</head>
<body>
    <div class="UTF-8">
        <header class="app-header">
            <h1 class="logo-text">TAB rot</h1>
            <span class="version-tag">v1.0.0</span>
        </header>

        <main class="settings-body">
       
      <div class="setting-row">
        <label for="global-toggle">Active Decaying</label>
        <div class="toggle-switch">  
        <input type="checkbox" id="global=toggle" checked />
        <span class="toggle-slider"></span>
        </div>
        </div>


         <div class="setting-row vertical">
        <label for="threshold-select">Decay Threshold</label>
        <select id="threshold-select" class="premium-select">
          <option value="1">1 Minute (Testing Mode)</option>
          <option value="60">1 Hour (Quick Rot)</option>
          <option value="1440">1 Day (Standard)</option>
          <option value="10080">1 Week (Hoarder Mode)</option>
        </select>
      </div>


      <div class="actions-group">
        <button id="test-rot-btn" class="btn primary">Decay Active Tab</button>
        <button id="reset-all-btn" class="btn secondary">Restore All Tabs</button>
      </div>
    </main>

    <footer class="app-footer">
      <span class="status-msg" id="status-display">settings synchronized</span>
    </footer>
  </div>
</body>
</html>
